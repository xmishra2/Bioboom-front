<script>

const API =
  'https://bioboomserver.onrender.com';

let remainingBudget = 30000;

let previousLog = [];
  const scenarioTips = {

  "Recession":

    "Economic contraction reduces demand, investment, and liquidity. Focus on resilience, operational efficiency, and controlled scaling.",

  "Boom":

    "Economic expansion increases demand and investment availability. Aggressive innovation and market expansion become viable strategies.",

  "Carbon Pricing Transition":

    "Carbon-intensive production becomes more expensive due to climate policy. Circularity and low-emission systems gain strategic advantage.",

  "Trade Protection Escalation":

    "Global trade barriers and geopolitical fragmentation disrupt international supply chains. Regional resilience becomes important.",

  "Credit Liquidity Crunch":

    "Financial systems tighten lending and reduce capital access. High-risk expansion strategies become increasingly fragile.",

  "Tech Breakthrough":

    "Rapid technological innovation creates opportunities for leapfrogging and disruptive scaling."
};

// --------------------------------------------------
// LOAD SCENARIO
// --------------------------------------------------

fetch(`${API}/scenario`)

.then(res => res.json())

.then(data => {

  document.getElementById(
    'currentScenario'
  ).innerText =

    data.scenario || 'Not Set';

  document.getElementById(
  'currentTip'
).innerText =

  data.policyNote ||

  scenarioTips[data.scenario] ||

  'No policy note available.';

});

// --------------------------------------------------
// SUBMIT
// --------------------------------------------------

function submitForm() {

  const playerId =

    document.getElementById(
      'playerId'
    ).value.trim();

  if (!playerId) {

    return alert(
      "Please enter your name."
    );
  }

  const data = {

    sector:
      document.getElementById(
        'sector'
      ).value,

    strategy:
      document.getElementById(
        'strategy'
      ).value,

    trl:
      parseInt(
        document.getElementById(
          'trl'
        ).value
      ),

    mrl:
      parseInt(
        document.getElementById(
          'mrl'
        ).value
      ),

    circularity:
      document.getElementById(
        'circularity'
      ).value,

    unitsBucket:
      document.getElementById(
        'unitsBucket'
      ).value,

    target:
      document.getElementById(
        'target'
      ).value
  };

  fetch(`${API}/submit`, {

    method: 'POST',

    headers: {

      'Content-Type':
        'application/json'
    },

    body: JSON.stringify({

      playerId,
      data
    })

  })

  .then(res => res.json())

  .then(result => {

    if (result.success) {

      // -----------------------------
      // UPDATE BUDGET
      // -----------------------------

      remainingBudget =
        result.remainingBudget;

      document.getElementById(
        'budgetDisplay'
      ).innerText =
        remainingBudget;

      // -----------------------------
      // RESPONSE BOX
      // -----------------------------

      document.getElementById(
        'responseBox'
      ).innerHTML =

      `
      <strong>
      ✅ Scenario ID:
      </strong>
      ${result.scenarioID}

      <br><br>

      <strong>
      Coherence Score:
      </strong>
      ${result.coherenceScore}

      <br><br>

      <strong>
      ESG Score:
      </strong>
      ${result.esg}

      <br><br>

      <strong>
      Innovation Score:
      </strong>
      ${result.innovation}

      <br><br>

      <strong>
      Resilience Score:
      </strong>
      ${result.resilience}

      <br><br>

      document.getElementById(
  'responseBox'
).innerHTML =

`
<strong>
✅ Scenario ID:
</strong>
${result.scenarioID}

<br><br>

<strong>
Coherence Score:
</strong>
${result.coherenceScore}

<br><br>

<strong>
ESG Score:
</strong>
${result.esg}

<br><br>

<strong>
Innovation Score:
</strong>
${result.innovation}

<br><br>

<strong>
Resilience Score:
</strong>
${result.resilience}

<hr>

<pre style="
white-space: pre-wrap;
font-family: Arial, sans-serif;
line-height: 1.5;
font-size: 0.95rem;
">

${result.feedback}

</pre>
`;

      // -----------------------------
      // LOG
      // -----------------------------

      previousLog.push({

        scenario:
          document.getElementById(
            'currentScenario'
          ).innerText,

        sector:
          data.sector,

        strategy:
          data.strategy,

        coherence:
          result.coherenceScore

      });

      if (previousLog.length > 5) {

        previousLog.shift();

      }

      document.getElementById(
        'submissionLog'
      ).innerHTML =

      previousLog.map((entry, i) =>

        `
        #${i + 1}

        ➤

        ${entry.scenario}

        |

        ${entry.sector}

        |

        ${entry.strategy}

        |

        Coherence:
        ${entry.coherence}
        `
      ).join('<br><br>');

    }

    else {

      document.getElementById(
        'responseBox'
      ).innerHTML =

      `
      ❌ ${result.message}
      `;
    }

  })

  .catch(error => {

    console.error(error);

    document.getElementById(
      'responseBox'
    ).innerHTML =

    `
    ❌ Submission failed.
    `;
  });

}

</script>

</body>
